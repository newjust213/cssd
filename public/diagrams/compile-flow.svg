<svg viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <g font-size="12" text-anchor="middle">
    <g fill="var(--dg-panel,#232e45)" stroke="var(--dg-stroke,#3a4a6b)">
      <rect x="10" y="40" width="90" height="48" rx="8"/>
      <rect x="130" y="40" width="90" height="48" rx="8" fill="var(--dg-fill,#31549e)"/>
      <rect x="250" y="40" width="90" height="48" rx="8"/>
      <rect x="370" y="40" width="90" height="48" rx="8" fill="var(--dg-fill,#31549e)"/>
      <rect x="490" y="40" width="90" height="48" rx="8"/>
    </g>
    <g fill="var(--dg-text,#e8ecf4)">
      <text x="55" y="61">원시</text><text x="55" y="77">프로그램</text>
      <text x="175" y="61">컴파일러</text><text x="175" y="77" font-size="10" fill="var(--dg-text2,#cdd8ee)">전체 번역</text>
      <text x="295" y="61">목적</text><text x="295" y="77">프로그램</text>
      <text x="415" y="61">링커</text><text x="415" y="77" font-size="10" fill="var(--dg-text2,#cdd8ee)">연계 편집</text>
      <text x="535" y="61">로드 모듈</text><text x="535" y="77" font-size="10" fill="var(--dg-text2,#cdd8ee)">로더→실행</text>
    </g>
    <g stroke="var(--dg-accent,#4f8cff)" stroke-width="2">
      <path d="M100,64 L130,64" marker-end="url(#f)"/>
      <path d="M220,64 L250,64" marker-end="url(#f)"/>
      <path d="M340,64 L370,64" marker-end="url(#f)"/>
      <path d="M460,64 L490,64" marker-end="url(#f)"/>
    </g>
    <rect x="130" y="140" width="90" height="48" rx="8" fill="var(--dg-panel,#232e45)" stroke="var(--dg-green,#2ecc71)"/>
    <text x="175" y="161" fill="var(--dg-green,#2ecc71)">인터프리터</text>
    <text x="175" y="177" font-size="10" fill="var(--dg-muted,#8b96ab)">한 줄씩 번역·실행</text>
    <path d="M55,88 L55,164 L130,164" stroke="var(--dg-green,#2ecc71)" stroke-width="2" fill="none" marker-end="url(#g)"/>
    <text x="420" y="164" fill="var(--dg-muted,#8b96ab)" font-size="12">목적 프로그램 없음 · 실행 속도 느림 (Python, BASIC)</text>
    <text x="320" y="215" fill="var(--dg-muted,#8b96ab)" font-size="12">컴파일러: 실행 빠름·목적 프로그램 생성 (C, Java)</text>
  </g>
  <defs>
    <marker id="f" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--dg-accent,#4f8cff)"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--dg-green,#2ecc71)"/></marker>
  </defs>
