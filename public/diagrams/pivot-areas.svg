<svg viewBox="0 0 640 270" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <g font-size="13" text-anchor="middle">
    <rect x="40" y="20" width="250" height="44" rx="8" fill="#232e45" stroke="#4f8cff" stroke-dasharray="5 3"/>
    <text x="165" y="41" fill="#4f8cff" font-weight="bold">필터 영역</text>
    <text x="165" y="57" fill="#8b96ab" font-size="11">보고서 전체를 거르는 필드 (예: 연도)</text>
    <rect x="310" y="20" width="290" height="44" rx="8" fill="#232e45" stroke="#2ecc71" stroke-dasharray="5 3"/>
    <text x="455" y="41" fill="#2ecc71" font-weight="bold">열 영역</text>
    <text x="455" y="57" fill="#8b96ab" font-size="11">가로 방향 항목 (예: 분기)</text>
    <rect x="40" y="80" width="250" height="160" rx="8" fill="#232e45" stroke="#e74c3c" stroke-dasharray="5 3"/>
    <text x="165" y="150" fill="#e74c3c" font-weight="bold">행 영역</text>
    <text x="165" y="168" fill="#8b96ab" font-size="11">세로 방향 항목 (예: 지점)</text>
    <rect x="310" y="80" width="290" height="160" rx="8" fill="#31549e"/>
    <text x="455" y="150" fill="#e8ecf4" font-weight="bold">값(Σ) 영역</text>
    <text x="455" y="170" fill="#cdd8ee" font-size="12">합계·개수·평균 등 집계</text>
    <text x="455" y="188" fill="#cdd8ee" font-size="12">값 필드 설정에서 함수·표시 형식 변경</text>
    <text x="320" y="262" fill="#8b96ab" font-size="12">원본 변경은 자동 반영 안 됨 → [새로 고침] · 날짜는 월/분기/연 그룹화 가능</text>
  </g>
</svg>
