<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <g font-size="13" text-anchor="middle">
    <rect x="20" y="20" width="290" height="200" rx="14" fill="none" stroke="#8b96ab" stroke-width="2"/>
    <text x="165" y="45" fill="#8b96ab" font-weight="bold">슈퍼키 (유일성만)</text>
    <rect x="45" y="60" width="240" height="140" rx="12" fill="none" stroke="#4f8cff" stroke-width="2"/>
    <text x="165" y="84" fill="#4f8cff" font-weight="bold">후보키 (유일성 + 최소성)</text>
    <rect x="60" y="100" width="100" height="80" rx="10" fill="#31549e"/>
    <text x="110" y="135" fill="#fff" font-weight="bold">기본키</text>
    <text x="110" y="153" fill="#dce8ff" font-size="11">선택된 1개</text>
    <text x="110" y="168" fill="#dce8ff" font-size="11">NULL·중복 불가</text>
    <rect x="175" y="100" width="100" height="80" rx="10" fill="#232e45" stroke="#3a4a6b"/>
    <text x="225" y="135" fill="#e8ecf4" font-weight="bold">대체키</text>
    <text x="225" y="153" fill="#8b96ab" font-size="11">기본키가 아닌</text>
    <text x="225" y="168" fill="#8b96ab" font-size="11">나머지 후보키</text>

    <g fill="#232e45" stroke="#3a4a6b">
      <rect x="370" y="60" width="110 " height="70" rx="8"/>
      <rect x="510" y="60" width="110" height="70" rx="8"/>
    </g>
    <text x="425" y="85" fill="#e8ecf4" font-weight="bold">〈부서〉</text>
    <text x="425" y="108" fill="#4f8cff" font-family="monospace" font-size="12">부서코드 PK</text>
    <text x="565" y="85" fill="#e8ecf4" font-weight="bold">〈사원〉</text>
    <text x="565" y="108" fill="#2ecc71" font-family="monospace" font-size="12">부서코드 FK</text>
    <path d="M510,95 L480,95" stroke="#2ecc71" stroke-width="2" marker-end="url(#k)"/>
    <text x="495" y="150" fill="#8b96ab" font-size="12">외래키: 참조 테이블의</text>
    <text x="495" y="167" fill="#8b96ab" font-size="12">기본키 값이거나 NULL</text>
    <text x="495" y="195" fill="#e74c3c" font-size="12">참조 무결성</text>
    <g fill="#8b96ab" font-size="12" text-anchor="start">
      <text x="30" y="255">개체 무결성: 기본키는 NULL·중복 불가</text>
      <text x="30" y="277">참조 무결성: 외래키는 부모의 기본키에 존재하는 값 또는 NULL</text>
    </g>
  </g>
  <defs><marker id="k" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2ecc71"/></marker></defs>
</svg>
