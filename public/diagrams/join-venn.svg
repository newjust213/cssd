<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <g font-size="13" text-anchor="middle">
    <text x="115" y="30" fill="#e8ecf4" font-weight="bold">INNER JOIN</text>
    <circle cx="90" cy="110" r="52" fill="none" stroke="#4f8cff" stroke-width="2"/>
    <circle cx="145" cy="110" r="52" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <path d="M117,66 A52,52 0 0 1 117,155 A52,52 0 0 1 117,66" fill="#4f8cff" opacity="0.55"/>
    <text x="62" y="115" fill="#8b96ab" font-size="11">A</text><text x="172" y="115" fill="#8b96ab" font-size="11">B</text>
    <text x="115" y="190" fill="#cdd8ee" font-size="12">양쪽 모두 일치하는</text>
    <text x="115" y="206" fill="#cdd8ee" font-size="12">레코드만</text>

    <text x="330" y="30" fill="#e8ecf4" font-weight="bold">LEFT JOIN</text>
    <circle cx="305" cy="110" r="52" fill="#4f8cff" opacity="0.55"/>
    <circle cx="305" cy="110" r="52" fill="none" stroke="#4f8cff" stroke-width="2"/>
    <circle cx="360" cy="110" r="52" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="277" y="115" fill="#e8ecf4" font-size="11">A</text><text x="387" y="115" fill="#8b96ab" font-size="11">B</text>
    <text x="330" y="190" fill="#cdd8ee" font-size="12">왼쪽(A)은 전부,</text>
    <text x="330" y="206" fill="#cdd8ee" font-size="12">일치 없으면 NULL</text>

    <text x="545" y="30" fill="#e8ecf4" font-weight="bold">불일치 검색</text>
    <mask id="notB"><rect x="0" y="0" width="640" height="240" fill="white"/><circle cx="575" cy="110" r="52" fill="black"/></mask>
    <circle cx="520" cy="110" r="52" fill="#e74c3c" opacity="0.55" mask="url(#notB)"/>
    <circle cx="520" cy="110" r="52" fill="none" stroke="#4f8cff" stroke-width="2"/>
    <circle cx="575" cy="110" r="52" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="492" y="115" fill="#e8ecf4" font-size="11">A</text><text x="602" y="115" fill="#8b96ab" font-size="11">B</text>
    <text x="545" y="190" fill="#cdd8ee" font-size="12">LEFT JOIN 후</text>
    <text x="545" y="206" fill="#cdd8ee" font-size="12">B.키 Is Null 조건</text>

    <text x="320" y="232" fill="#8b96ab" font-size="12">Access 쿼리의 핵심 패턴 — 조인 선 더블클릭으로 조인 유형 변경</text>
  </g>
</svg>
